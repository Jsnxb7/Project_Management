{% extends "base.html" %}

{% block title %}Profile | TaskFlow{% endblock %}

{% block content %}
<section class="page-head">
    <p class="eyebrow">Account</p>
    <h1>My Profile</h1>
</section>

<section class="details-grid">
    <div class="panel">
        <h2>Profile Details</h2>
        <form id="profileForm">
            <label>Name</label>
            <input type="text" id="profileName" required placeholder="Your full name">

            <label>Email</label>
            <input type="email" id="profileEmail" required placeholder="you@company.com">

            <button class="btn" type="submit">Save Profile</button>
        </form>
        <p id="profileMessage" class="message"></p>
    </div>

    <div class="panel">
        <h2>Change Password</h2>
        <form id="passwordForm">
            <label>Current Password</label>
            <input type="password" id="currentPassword" required placeholder="Current password">

            <label>New Password</label>
            <input type="password" id="newPassword" required placeholder="New password (min 8 chars)">

            <button class="btn" type="submit">Update Password</button>
        </form>
        <p id="passwordMessage" class="message"></p>
    </div>
</section>

<section class="stats-grid">
    <article class="stat-card">
        <span>Projects</span>
        <strong id="profileProjects">0</strong>
    </article>
    <article class="stat-card">
        <span>Assigned Tasks</span>
        <strong id="profileTasks">0</strong>
    </article>
    <article class="stat-card">
        <span>Completed</span>
        <strong id="profileDone">0</strong>
    </article>
    <article class="stat-card">
        <span>Account Status</span>
        <strong class="small-stat" style="font-size:1.4rem;color:var(--green)">Active</strong>
    </article>
</section>

<section class="panel">
    <h2>Recent Activity</h2>
    <div id="profileActivity" class="activity-list"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
